<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Adetoye Adebayo</title>
    <script>
      // GitHub Pages SPA redirect (spa-github-pages, MIT).
      // Pages serves this file for unknown paths; it re-encodes the path as a
      // query string and bounces to index.html, where it gets decoded back.
      var pathSegmentsToKeep = 0

      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
